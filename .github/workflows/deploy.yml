name: Deploy to GitHub Pages

on:
  # Trigger del deploy ogni volta che fai push sul branch main
  push:
    branches: ['main'] # NOTA: se il tuo branch si chiama 'master', cambia 'main' in 'master'

# Permessi necessari per GitHub Actions per scrivere sulle Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Permette un solo deploy alla volta (evita conflitti se fai due push veloci)
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Installa le dipendenze
        run: npm install

      - name: Compila il progetto (Vite Build)
        run: npm run build

      - name: Configura GitHub Pages
        uses: actions/configure-pages@v4

      - name: Carica l'artefatto (cartella dist)
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Esegui il Deploy
        id: deployment
        uses: actions/deploy-pages@v4
